<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home
    </title>
    <link rel="stylesheet" href="{{ url_for('static', filename= 'main.css')}} ">
</head>
<body>
    <div class="navbar">
        <div class="container">
            <a class="nav-heading" href="{{ url_for('home_page') }}">Cassava<span>Classifier</span></a>
            <img id="mobile-cta" class="mobile-menu" src="{{url_for('static', filename='images/menu.svg')}}" alt="Open navigation">
            <nav class="nav-menu">
                <img id="mobile-exit" class="mobile-exit" src="{{ url_for('static', filename='images/exit.svg')}}" alt="Exit navigation"/>
                <ul class="primary-nav">
                    <li><a href="{{ url_for('home_page') }}">Home</a></li>
                    <li><a href="{{ url_for('about_page') }}">AboutProject</a></li>
                    <li><a href="{{ url_for('categories_page') }}">Categories</a></li>
                </ul>
            </nav>  
        </div>
    </div>   


    <section class="hero">
        <div class="container" style="background-image: url({{url_for('static', filename='images/cassava-leaf2.jpg')}})">
            <p class="subheading">Multi-label Image Classifier</p>
            <h1 class="main-heading">Cassava Leaf Disease Classification App</h1>
        </div>
    </section>  
   
    <section class="hero-input">
        <div class="main-div">
            <div class="input-div">
                <form id="upload-image" method="post" enctype="multipart/form-data">
                    <h2>Upload Image</h2>
                    <label for="ImageUpload" class="image-unpload">
                    </label>
                    <input class="input-btn" type="file" name="file" id="ImageUpload" accept=".png, .jpg, .jpeg">
                    
                    <!-- Image Preview -->
                    <div id="preview-container" style="display: none; margin-top: 20px; text-align: center;">
                        <h3 style="color: #007AF3; margin-bottom: 15px;">Image Preview</h3>
                        <img id="preview-image" src="" alt="Preview" style="max-width: 300px; max-height: 300px; border-radius: 1.2em; box-shadow: 0 4px 24px rgba(0,0,0,0.08); margin-bottom: 15px;">
                        <p id="file-info" style="color: #666; font-size: 0.9em; margin-bottom: 15px;"></p>
                        <button type="button" id="clear-btn" style="background: #E74C3C; color: white; border: none; padding: 8px 16px; border-radius: 0.8em; cursor: pointer; margin-bottom: 15px; font-weight: 600;">Change Image</button>
                    </div>
                    
                    <input type="submit" class="predict-btn" value="Predict">
                </form>
            </div>
        </div>
    </section>
    
    <br>
    <br>

    <footer>
        <div>
           <p>To know more about this project go to About-Page</p>
            <a class="footer-about" href="{{ url_for('about_page') }}">About</a>
        </div>
    </footer>


<!--  java script for clicking menu-->
<!-- to select buttons in js -->
<!-- event lister means allowing click on that  -->
        <script>
             
            const mobileBtn= document.getElementById('mobile-cta')
                     nav = document.querySelector('nav')
                     mobileBtnExit = document.getElementById('mobile-exit');

            mobileBtn.addEventListener('click', ()=> {
                nav.classList.add('menu-btn');
            })    
            
            mobileBtnExit.addEventListener('click', () => {
                nav.classList.remove('menu-btn');
            })

            // Image Preview Functionality
            const imageInput = document.getElementById('ImageUpload');
            const previewContainer = document.getElementById('preview-container');
            const previewImage = document.getElementById('preview-image');
            const fileInfo = document.getElementById('file-info');
            const clearBtn = document.getElementById('clear-btn');

            imageInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                
                if (file) {
                    // Validate file type
                    const validTypes = ['image/png', 'image/jpeg', 'image/jpg'];
                    if (!validTypes.includes(file.type)) {
                        alert('Please upload a PNG or JPG image');
                        imageInput.value = '';
                        previewContainer.style.display = 'none';
                        return;
                    }

                    // Validate file size (5MB max)
                    if (file.size > 5 * 1024 * 1024) {
                        alert('File size must be less than 5MB');
                        imageInput.value = '';
                        previewContainer.style.display = 'none';
                        return;
                    }

                    // Read and display file
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        previewImage.src = event.target.result;
                        fileInfo.innerHTML = `<strong>File:</strong> ${file.name} | <strong>Size:</strong> ${(file.size / 1024).toFixed(2)} KB`;
                        previewContainer.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Clear/Change Image Button
            clearBtn.addEventListener('click', function(e) {
                e.preventDefault();
                imageInput.value = '';
                previewContainer.style.display = 'none';
            });
        </script>

</body>
</html>
